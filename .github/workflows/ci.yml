name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      java-versions:
        description: >-
          JSON array of Java versions for the unit-test matrix.
          Default (empty) runs the full matrix: ["17", "21", "25-ea"].
        type: string
        default: ""
      integration-matrix:
        description: >-
          JSON array of objects for the integration-test matrix.
          Default (empty) runs the full matrix with per-version ports.
        type: string
        default: ""
      run-security:
        type: boolean
        default: true
      run-release:
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-quality.yml@v1.5
    with:
      language: java
      versions: '["21"]'

  security:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.5
    with:
      language: java
      run-standards: ${{ inputs.run-release || true }}
      run-security: ${{ inputs.run-security || true }}
    permissions:
      contents: read
      security-events: write

  release:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-release.yml@v1.5
    with:
      language: java
      run-release: ${{ inputs.run-release != false }}

  test:
    name: "test / unit / ${{ matrix.java-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ${{ fromJSON(inputs.java-versions || '["17", "21", "25-ea"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Run full validation pipeline
        run: ./mvnw verify -B

  audit:
    name: "audit / dependencies"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify dependency resolution
        run: ./mvnw dependency:tree -B -q

      - name: Run license compliance check
        run: >-
          ./mvnw org.codehaus.mojo:license-maven-plugin:2.7.0:add-third-party
          -Dlicense.excludedScopes=test
          -Dlicense.failIfWarning=true
          "-Dlicense.includedLicenses=Apache-2.0|Apache 2.0|The Apache License, Version 2.0|MIT License|BSD-2-Clause|BSD-3-Clause|ISC|MPL-2.0|GPL-3.0-or-later"
          -B

  integration-tests:
    name: "test / integration / ${{ matrix.java-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(inputs.integration-matrix || '[
            {"java-version":"17","qm1-rest-port":"9453","qm2-rest-port":"9454","qm1-mq-port":"1426","qm2-mq-port":"1427"},
            {"java-version":"21","qm1-rest-port":"9455","qm2-rest-port":"9456","qm1-mq-port":"1428","qm2-mq-port":"1429"},
            {"java-version":"25-ea","qm1-rest-port":"9457","qm2-rest-port":"9458","qm1-mq-port":"1430","qm2-mq-port":"1431"}
          ]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Setup MQ environment
        uses: wphillipmoore/mq-rest-admin-dev-environment/.github/actions/setup-mq@main
        with:
          project-name: mqrest-java-${{ matrix.java-version }}
          qm1-rest-port: ${{ matrix.qm1-rest-port }}
          qm2-rest-port: ${{ matrix.qm2-rest-port }}
          qm1-mq-port: ${{ matrix.qm1-mq-port }}
          qm2-mq-port: ${{ matrix.qm2-mq-port }}

      - name: Run integration tests
        env:
          MQ_REST_ADMIN_RUN_INTEGRATION: "1"
          MQ_SKIP_LIFECYCLE: "1"
          MQ_REST_BASE_URL: https://localhost:${{ matrix.qm1-rest-port }}/ibmmq/rest/v2
          MQ_REST_BASE_URL_QM2: https://localhost:${{ matrix.qm2-rest-port }}/ibmmq/rest/v2
        run: ./mvnw verify -B
