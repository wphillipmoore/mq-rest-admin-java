name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      java-versions:
        description: >-
          JSON array of Java versions for the unit-test matrix.
          Default (empty) runs the full matrix: ["17", "21"].
        type: string
        default: ""
      integration-matrix:
        description: >-
          JSON array of objects for the integration-test matrix.
          Default (empty) runs the full matrix with per-version ports.
        type: string
        default: ""
      run-security:
        type: boolean
        default: true
      run-release:
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-quality.yml@v1.5
    with:
      language: java
      versions: ${{ inputs.java-versions || '["17", "21"]' }}

  security:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.5
    with:
      language: java
      run-standards: ${{ inputs.run-release || true }}
      run-security: ${{ inputs.run-security || true }}
    permissions:
      contents: read
      security-events: write

  release:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-release.yml@v1.5
    with:
      language: java
      run-release: ${{ inputs.run-release != false }}

  test:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-test.yml@v1.5
    with:
      language: java
      versions: ${{ inputs.java-versions || '["17", "21"]' }}

  audit:
    # yamllint disable-line rule:line-length
    uses: wphillipmoore/standard-actions/.github/workflows/ci-audit.yml@v1.5
    with:
      language: java
      versions: ${{ inputs.java-versions || '["17", "21"]' }}

  integration-tests:
    name: "test / integration / ${{ matrix.java-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(inputs.integration-matrix || '[
            {"java-version":"17","qm1-rest-port":"9453","qm2-rest-port":"9454","qm1-mq-port":"1426","qm2-mq-port":"1427"},
            {"java-version":"21","qm1-rest-port":"9455","qm2-rest-port":"9456","qm1-mq-port":"1428","qm2-mq-port":"1429"}
          ]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Setup MQ environment
        # yamllint disable-line rule:line-length
        uses: wphillipmoore/mq-rest-admin-dev-environment/.github/actions/setup-mq@main
        with:
          project-name: mqrest-java-${{ matrix.java-version }}
          qm1-rest-port: ${{ matrix.qm1-rest-port }}
          qm2-rest-port: ${{ matrix.qm2-rest-port }}
          qm1-mq-port: ${{ matrix.qm1-mq-port }}
          qm2-mq-port: ${{ matrix.qm2-mq-port }}

      - name: Run integration tests
        env:
          MQ_REST_ADMIN_RUN_INTEGRATION: "1"
          MQ_SKIP_LIFECYCLE: "1"
          # yamllint disable-line rule:line-length
          MQ_REST_BASE_URL: https://localhost:${{ matrix.qm1-rest-port }}/ibmmq/rest/v2
          # yamllint disable-line rule:line-length
          MQ_REST_BASE_URL_QM2: https://localhost:${{ matrix.qm2-rest-port }}/ibmmq/rest/v2
        run: ./mvnw verify -B
